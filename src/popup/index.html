<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Assistant</title>

  <style>
    body {
      width: 450px;
      min-height: 300px;
      max-height: 600px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f5f5f5;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
    }

    .header p {
      margin: 5px 0 0 0;
      font-size: 12px;
      opacity: 0.9;
    }

    .stats {
      background: white;
      padding: 15px 20px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stats-item {
      text-align: center;
    }

    .stats-number {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }

    .stats-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .pages-container {
      max-height: 400px;
      overflow-y: auto;
      padding: 10px;
    }

    .page-item {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .page-item:hover {
      border-color: #667eea;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
      transform: translateY(-2px);
    }

    .page-url {
      font-size: 13px;
      color: #667eea;
      font-weight: 500;
      margin-bottom: 8px;
      word-break: break-all;
    }

    .page-preview {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .page-meta {
      display: flex;
      gap: 15px;
      font-size: 11px;
      color: #999;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #f0f0f0;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .empty-state-title {
      font-size: 16px;
      font-weight: 600;
      color: #666;
      margin-bottom: 8px;
    }

    .empty-state-text {
      font-size: 13px;
      line-height: 1.5;
    }

    .actions {
      padding: 15px 20px;
      background: white;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .pages-container::-webkit-scrollbar {
      width: 6px;
    }

    .pages-container::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    .pages-container::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 3px;
    }

    .pages-container::-webkit-scrollbar-thumb:hover {
      background: #999;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>📚 Research Assistant</h1>
    <p>Your automatically saved pages</p>
  </div>

  <div class="stats">
    <div class="stats-item">
      <div class="stats-number" id="totalPages">0</div>
      <div class="stats-label">Pages Saved</div>
    </div>
    <div class="stats-item">
      <div class="stats-number" id="totalWords">0</div>
      <div class="stats-label">Total Words</div>
    </div>
    <div class="stats-item">
      <div class="stats-number" id="avgTime">0s</div>
      <div class="stats-label">Avg Time</div>
    </div>
  </div>

  <div class="pages-container" id="pagesList">
    <!-- Pages will be inserted here -->
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="exportBtn">📥 Export All</button>
    <button class="btn btn-danger" id="clearBtn">🗑️ Clear All</button>
  </div>

  <script src="index.js"></script>
</body>

</html>
