<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HindSite Quick Search</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a3252 0%, #263e5e 50%, #2c384a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    body.standalone {
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 32px;
    }

    body.standalone .shell {
      position: relative;
      z-index: 1;
    }

    .shell {
      min-width: 420px;
      max-width: 560px;
      width: 46vw;
      box-sizing: border-box;
      padding: 12px 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(26,50,82,0.96) 0%, rgba(38,62,94,0.94) 50%, rgba(44,56,74,0.92) 100%);
      box-shadow:
        0 20px 48px rgba(26,50,82,0.45),
        0 0 0 1px rgba(148,163,184,0.35);
      border: 1px solid rgba(148,163,184,0.5);
      backdrop-filter: blur(22px);
      display: flex;
      align-items: center;
      gap: 10px;
      color: #e2e8f0;
      opacity: 0;
      transform: translateY(18px) scale(0.985);
      transition: transform 180ms cubic-bezier(.2,.9,.2,1.15), opacity 180ms ease-out;
    }

    .shell.is-open {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .hint {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #94a3b8;
      margin-right: 4px;
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: #f1f5f9;
      font-size: 14px;
      font-weight: 400;
      padding: 3px 0;
      resize: none;
      overflow: hidden;
      min-height: 20px;
      max-height: 120px;
      line-height: 1.35;
    }

    .input::placeholder {
      color: #94a3b8;
    }

    @keyframes hsMicPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.22);
      }
      70% {
        box-shadow: 0 0 0 10px rgba(255, 255, 255, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
      }
    }

    .mic-btn {
      flex: 0 0 auto;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.5);
      background: rgba(26,50,82,0.9);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }

    .mic-btn.listening {
      border-color: rgba(255, 255, 255, 0.6);
      animation: hsMicPulse 1.1s ease-in-out infinite;
    }

    .send-chip {
      flex: 0 0 auto;
      font-size: 12px;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      background: rgba(26,50,82,0.9);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
      user-select: none;
    }

    .send-chip span {
      transform: translateY(-1px);
      font-size: 14px;
    }

    .hint-kbd {
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 10px;
      color: #94a3b8;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hint">HindSite quick search</div>
    <textarea
      id="quickSearchInput"
      class="input"
      placeholder="Type to search..."
      autocomplete="off"
      spellcheck="false"
      rows="1"
    ></textarea>
    <button class="mic-btn" id="quickSearchMicBtn" type="button" title="Voice input">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
        <path d="M12 3a2.5 2.5 0 0 1 2.5 2.5v5A2.5 2.5 0 0 1 12 13a2.5 2.5 0 0 1-2.5-2.5v-5A2.5 2.5 0 0 1 12 3Zm0 14a5 5 0 0 0 5-5 .75.75 0 0 1 1.5 0A6.5 6.5 0 0 1 12.75 18.47V21h-1.5v-2.53A6.5 6.5 0 0 1 5.5 12a.75.75 0 0 1 1.5 0 5 5 0 0 0 5 5Z" fill="currentColor"/>
      </svg>
    </button>
    <div class="send-chip" title="Send (not wired yet)">
      <span>➤</span>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
