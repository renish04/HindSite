<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HindSite Quick Search</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top left, #020617 0, #020617 60%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .shell {
      width: min(520px, 96vw);
      padding: 12px 14px;
      border-radius: 999px;
      background: radial-gradient(circle at top left, rgba(15,23,42,0.95), rgba(15,23,42,0.9));
      box-shadow:
        0 20px 48px rgba(15,23,42,0.9),
        0 0 0 1px rgba(148,163,184,0.45);
      border: 1px solid rgba(148,163,184,0.65);
      backdrop-filter: blur(22px);
      display: flex;
      align-items: center;
      gap: 10px;
      color: #e5e7eb;
    }

    .hint {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #9ca3af;
      margin-right: 4px;
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: #f9fafb;
      font-size: 14px;
      font-weight: 400;
      padding: 3px 0;
    }

    .input::placeholder {
      color: #6b7280;
    }

    .send-chip {
      flex: 0 0 auto;
      font-size: 12px;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      background: rgba(15,23,42,0.96);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
      user-select: none;
    }

    .send-chip span {
      transform: translateY(-1px);
      font-size: 14px;
    }

    .hint-kbd {
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 10px;
      color: #6b7280;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hint">HindSite quick search</div>
    <input
      id="quickSearchInput"
      class="input"
      type="text"
      placeholder="Type to search (preview only, not sending yet)…"
      autocomplete="off"
      spellcheck="false"
    />
    <div class="send-chip" title="Send (not wired yet)">
      <span>➤</span>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
