<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HindSite Topics</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Your Topic Clusters</h1>
        <p>Pages grouped automatically by HindSite AI</p>
      </div>
      <div class="actions">
        <button id="autoOrganizeBtn" class="btn primary">Auto-Organize</button>
        <button id="retrainBtn" class="btn secondary">Retrain</button>
      </div>
    </header>

    <section class="status-wrap">
      <div id="statusBadge" class="status-badge">Loading model status...</div>
      <div id="errorBox" class="error hidden"></div>
    </section>

    <main>
      <div id="loading" class="loading">Loading topic clusters...</div>
      <div id="topicsRoot" class="topics hidden"></div>
      <div id="emptyState" class="empty hidden">
        <h3>No clustered pages yet</h3>
        <p>Capture some pages first, then click Auto-Organize.</p>
      </div>
    </main>
  </div>

  <script src="./index.js"></script>
</body>
</html>
